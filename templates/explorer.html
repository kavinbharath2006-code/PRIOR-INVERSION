<!DOCTYPE html>
<html>
<head>
  <title>Ledger Explorer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
    body { background: #f0f2f5; padding: 40px 20px; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { font-size: 22px; color: #1a1a2e; margin-bottom: 6px; }
    .sub { color: #888; font-size: 14px; margin-bottom: 30px; }
    table { width: 100%; background: white; border-radius: 12px; border-collapse: collapse; overflow: hidden; }
    th { background: #1a1a2e; color: white; padding: 12px 16px; font-size: 12px; text-align: left; font-weight: 600; letter-spacing: .04em; }
    td { padding: 12px 16px; font-size: 13px; border-bottom: 1px solid #f0f0f0; vertical-align: top; }
    tr:last-child td { border: none; }
    tr:hover td { background: #fafafa; }
    .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    .CredentialIssued    { background: #E1F5EE; color: #0F6E56; }
    .CredentialRevoked   { background: #FAECE7; color: #993C1D; }
    .VerificationLogged  { background: #E6F1FB; color: #185FA5; }
    .mono { font-family: monospace; font-size: 11px; color: #666; }
    .refresh { background: #BA7517; color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; float: right; }
    a.back { display: inline-block; color: #BA7517; font-size: 13px; margin-bottom: 20px; text-decoration: none; }
    .empty { text-align: center; color: #aaa; padding: 40px; font-size: 14px; }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back">← Back to home</a>
    <h1>Blockchain Ledger Explorer</h1>
    <p class="sub">Live event log — auto refreshes every 5 seconds <button class="refresh" onclick="loadEvents()">Refresh now</button></p>
    <table>
      <thead>
        <tr>
          <th>Event</th>
          <th>DID</th>
          <th>Timestamp</th>
          <th>Detail</th>
        </tr>
      </thead>
      <tbody id="events-body"></tbody>
    </table>
  </div>

  <script>
    async function loadEvents() {
      const res = await fetch("/api/events");
      const data = await res.json();
      const tbody = document.getElementById("events-body");
      if (!data.events || data.events.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" class="empty">No events yet.</td></tr>';
        return;
      }
      tbody.innerHTML = data.events.map(e => `
        <tr>
          <td><span class="badge ${e.event}">${e.event}</span></td>
          <td class="mono">${e.did}</td>
          <td style="color:#888;font-size:12px">${new Date(e.timestamp * 1000).toLocaleString()}</td>
          <td class="mono">${e.detail || "-"}</td>
        </tr>
      `).join("");
    }
    loadEvents();
    setInterval(loadEvents, 5000);
  </script>
</body>
</html>
