<!DOCTYPE html>
<html>
<head>
  <title>DMV Issuer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
    body { background: #f0f2f5; padding: 40px 20px; }
    .container { max-width: 540px; margin: 0 auto; }
    h1 { font-size: 22px; color: #1a1a2e; margin-bottom: 6px; }
    .sub { color: #888; font-size: 14px; margin-bottom: 30px; }
    .card { background: white; border-radius: 12px; padding: 28px; margin-bottom: 20px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #444; margin-bottom: 6px; margin-top: 16px; }
    input, select { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; }
    input:focus, select:focus { border-color: #7F77DD; }
    .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 20px; transition: opacity .2s; }
    .btn:hover { opacity: .85; }
    .btn-issue  { background: #7F77DD; color: white; }
    .btn-revoke { background: #D85A30; color: white; }
    .result { padding: 14px; border-radius: 8px; margin-top: 16px; font-size: 13px; line-height: 1.7; display: none; }
    .result.success { background: #E1F5EE; color: #0F6E56; border: 1px solid #1D9E75; }
    .result.error   { background: #FAECE7; color: #993C1D; border: 1px solid #D85A30; }
    .did-box { background: #f5f5f5; padding: 10px 14px; border-radius: 8px; font-family: monospace; font-size: 12px; word-break: break-all; margin-top: 8px; }
    a.back { display: inline-block; color: #7F77DD; font-size: 13px; margin-bottom: 20px; text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back">← Back to home</a>
    <h1>DMV Issuer Portal</h1>
    <p class="sub">Issue and manage digital driver licenses</p>

    <div class="card">
      <h2 style="font-size:16px;color:#333">Issue new license</h2>
      <label>Full name</label>
      <input id="name" placeholder="e.g. Arjun Sharma" />
      <label>Date of birth</label>
      <input id="dob" type="date" />
      <label>License class</label>
      <select id="lclass">
        <option value="A">Class A — Heavy vehicle</option>
        <option value="B" selected>Class B — Light vehicle</option>
        <option value="C">Class C — Motorcycle</option>
      </select>
      <button class="btn btn-issue" onclick="issueLicense()">Issue License</button>
      <div id="issue-result" class="result"></div>
    </div>

    <div class="card">
      <h2 style="font-size:16px;color:#333">Revoke a license</h2>
      <label>DID to revoke</label>
      <input id="revoke-did" placeholder="did:bdl:xxxxxxxx" />
      <label>Reason</label>
      <input id="revoke-reason" placeholder="e.g. DUI offence" />
      <button class="btn btn-revoke" onclick="revokeLicense()">Revoke License</button>
      <div id="revoke-result" class="result"></div>
    </div>
  </div>

  <script>
    async function issueLicense() {
      const res = await fetch("/api/issue", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
          name: document.getElementById("name").value,
          dob:  document.getElementById("dob").value,
          license_class: document.getElementById("lclass").value
        })
      });
      const data = await res.json();
      const el = document.getElementById("issue-result");
      el.style.display = "block";
      if (data.success) {
        el.className = "result success";
        el.innerHTML = `License issued successfully!<br>
          <strong>Name:</strong> ${data.credential.name}<br>
          <strong>Class:</strong> ${data.credential.license_class}<br>
          <strong>DID:</strong><div class="did-box">${data.credential.did}</div>
          <strong>Hash:</strong><div class="did-box">${data.credential.hash}</div>`;
      } else {
        el.className = "result error";
        el.innerHTML = "Error: " + data.error;
      }
    }

    async function revokeLicense() {
      const res = await fetch("/api/revoke", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
          did: document.getElementById("revoke-did").value,
          reason: document.getElementById("revoke-reason").value
        })
      });
      const data = await res.json();
      const el = document.getElementById("revoke-result");
      el.style.display = "block";
      el.className = data.success ? "result success" : "result error";
      el.innerHTML = data.success ? data.message : "Error: " + data.error;
    }
  </script>
</body>
</html>
